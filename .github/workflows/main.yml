name: DevPulse CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Build Backend
      run: |
        docker build -t devpulse-backend -f Dockerfile.backend .

    - name: Build Frontend
      run: |
        docker build -t devpulse-frontend -f Dockerfile.frontend .
