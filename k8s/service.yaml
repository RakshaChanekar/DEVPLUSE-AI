apiVersion: v1
kind: Service
metadata:
  name: devpulse-backend
spec:
  type: ClusterIP
  selector:
    app: devpulse-backend
  ports:
    - name: http
      port: 5000
      targetPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: devpulse-frontend
spec:
  type: LoadBalancer
  selector:
    app: devpulse-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
