apiVersion: apps/v1
kind: Deployment
metadata:
  name: devpulse-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devpulse-backend
  template:
    metadata:
      labels:
        app: devpulse-backend
    spec:
      containers:
        - name: backend
          image: your-dockerhub/devpulse-backend:latest
          ports:
            - containerPort: 5000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "5000"
            - name: JSON_LIMIT
              value: 1mb
            - name: CORS_ORIGIN
              value: "*"
            - name: GEMINI_MODEL
              value: gemini-2.5-flash
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: devpulse-secrets
                  key: GEMINI_API_KEY
                  optional: true
          readinessProbe:
            httpGet:
              path: /api/status
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/status
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devpulse-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devpulse-frontend
  template:
    metadata:
      labels:
        app: devpulse-frontend
    spec:
      containers:
        - name: frontend
          image: your-dockerhub/devpulse-frontend:latest
          ports:
            - containerPort: 80
          env:
            - name: DEVPULSE_API_UPSTREAM
              value: http://devpulse-backend:5000
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
