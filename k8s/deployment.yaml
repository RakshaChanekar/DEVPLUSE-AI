apiVersion: apps/v1
kind: Deployment
metadata:
  name: devpulse
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devpulse
  template:
    metadata:
      labels:
        app: devpulse
    spec:
      containers:
      - name: backend
        image: your-dockerhub/devpulse-backend
        ports:
        - containerPort: 5000